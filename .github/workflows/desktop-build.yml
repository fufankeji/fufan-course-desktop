name: FuFan Course Desktop Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
      - "desktop-v*"

permissions:
  contents: read

jobs:
  build-macos:
    name: Build macOS DMG
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run tests
        run: npm test

      - name: Build FuFan Agent runtime
        run: npm run runtime:build

      - name: Stage desktop resources
        run: npm run prepare:desktop

      - name: Check desktop package environment
        run: npm run desktop:doctor

      - name: Run packaged-resource smoke test
        run: npm run release:smoke

      - name: Build DMG
        run: npm run desktop:build:mac

      - name: List DMG artifacts
        run: ls -lh src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: fufan-course-desktop-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 14

  build-windows:
    name: Build Windows NSIS
    runs-on: windows-2022
    timeout-minutes: 90
    env:
      TAURI_TARGET_TRIPLE: x86_64-pc-windows-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run packaging tests
        run: node --test backend/tests/desktop-package.test.js backend/tests/tauri-runner.test.js

      - name: Build FuFan Agent runtime
        run: npm run runtime:build

      - name: Verify Windows runtime binaries
        shell: pwsh
        run: |
          Test-Path backend/runtime/bin/codewhale-tui.exe
          Test-Path backend/runtime/bin/fufan-pty-bridge.exe
          if (!(Test-Path backend/runtime/bin/codewhale-tui.exe)) { throw "Missing codewhale-tui.exe" }
          if (!(Test-Path backend/runtime/bin/fufan-pty-bridge.exe)) { throw "Missing fufan-pty-bridge.exe" }

      - name: Stage desktop resources
        run: npm run prepare:desktop

      - name: Check desktop package environment
        run: npm run desktop:doctor

      - name: Build NSIS installer
        run: npm run desktop:build:win

      - name: List Windows artifacts
        shell: pwsh
        run: Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Format-List FullName,Length,LastWriteTime

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: fufan-course-desktop-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14
