name: FuFan Course Desktop Build

on:
  workflow_dispatch:

jobs:
  build-macos:
    name: Build macOS DMG
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build FuFan Agent runtime
        run: npm run runtime:build

      - name: Build DMG
        run: npm run desktop:build:mac

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: fufan-course-desktop-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg

  build-windows:
    name: Build Windows NSIS
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build FuFan Agent runtime
        run: npm run runtime:build

      - name: Build NSIS installer
        run: npm run desktop:build:win

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: fufan-course-desktop-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
